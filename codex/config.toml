#:schema https://developers.openai.com/codex/config-schema.json
approval_policy = "never"
check_for_update_on_startup = true
developer_instructions = """
The project contract in AGENTS.md is binding: delivery gates (`dev` is sacred,
Definition-of-Ready), orchestration (sole orchestrator, smallest effective
execution shape), escalation, memory, and the Codex custom-agent spawn rules.
Read it and follow it. It is the single source of truth -- do not rely on a copy
of these rules living anywhere else.
"""
model_reasoning_summary = "auto"
personality = "pragmatic"
project_doc_fallback_filenames = [
    "CODEX.md",
    "codex.md",
]
project_doc_max_bytes = 65536
sandbox_mode = "danger-full-access"
web_search = "live"

[agents]
job_max_runtime_seconds = 1800
max_depth = 1
max_threads = 8

[apps._default]
destructive_enabled = true
enabled = true
open_world_enabled = true

[features]
apps = true
fast_mode = false
hooks = true
multi_agent = true
plugins = true
prevent_idle_sleep = true

# GPT-5.6 Sol/Terra select MultiAgent V2 via model metadata, which defaults
# hide_spawn_agent_metadata = true and strips agent_type/model/reasoning_effort
# from the model-visible spawn_agent schema -- silently forcing every subagent to
# inherit the lead's model and sandbox, ignoring .codex/agents/*.toml.
# openai/codex#31814 (tool_namespace avoids the reserved-name error).
[features.multi_agent_v2]
hide_spawn_agent_metadata = false
tool_namespace = "agents"

[mcp_servers.chrome_devtools]
args = [
    "-y",
    "chrome-devtools-mcp@latest",
]
command = "npx"
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 45

[mcp_servers.context7]
args = [
    "-y",
    "@upstash/context7-mcp",
]
command = "npx"
enabled = true
required = false
startup_timeout_sec = 300
supports_parallel_tool_calls = true
tool_timeout_sec = 300

[mcp_servers.figma]
enabled = true
url = "https://mcp.figma.com/mcp"

[mcp_servers.filesystem]
args = [
    "-y",
    "@modelcontextprotocol/server-filesystem",
    ".",
]
command = "npx"
cwd = "."
enabled = true
required = false
startup_timeout_sec = 120
tool_timeout_sec = 120

[mcp_servers.github]
args = [
    "-y",
    "@modelcontextprotocol/server-github",
]
command = "npx"
enabled = false
required = false
startup_timeout_sec = 20
tool_timeout_sec = 45

[mcp_servers.linear]
enabled = false
required = false
startup_timeout_sec = 20
tool_timeout_sec = 45
url = "https://mcp.linear.app/mcp"

[mcp_servers.openaiDeveloperDocs]
enabled = true
required = false
startup_timeout_sec = 20
supports_parallel_tool_calls = true
tool_timeout_sec = 45
url = "https://developers.openai.com/mcp"

[mcp_servers.playwright]
args = [
    "-y",
    "@playwright/mcp",
]
command = "npx"
cwd = "."
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 90

[mcp_servers.sentry]
enabled = false
required = false
startup_timeout_sec = 20
tool_timeout_sec = 45
url = "https://mcp.sentry.dev"

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE = "85"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
ENABLE_PROMPT_CACHING_1H = "1"

[tools]
view_image = true
